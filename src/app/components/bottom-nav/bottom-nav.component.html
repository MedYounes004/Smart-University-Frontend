<div class="bottom-nav">
  <nav class="nav-inner">
    <button
      *ngFor="let tab of tabs"
      class="tab-btn"
      [class.active]="activeTab === tab.id"
      (click)="onTabClick(tab.id)"
    >
      <div class="icon-wrap">
        <ion-icon [name]="activeTab === tab.id ? tab.activeIcon : tab.icon"></ion-icon>
        <div *ngIf="activeTab === tab.id" class="active-bg"></div>
      </div>
      <span class="tab-label">{{ tab.label }}</span>
    </button>
  </nav>
</div>
